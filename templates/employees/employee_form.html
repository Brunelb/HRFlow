{% extends 'base.html' %}
{% load static %}

{% block title %}{{ title }} - HRFlow{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'assets/css/modules.css' %}">
{% endblock %}

{% block content %}
<div class="module-page">

    <div class="module-header">
        <div>
            <h1 class="module-title">{{ title }}</h1>
            <p class="module-subtitle">
                Renseigner les informations RH du membre du personnel.
            </p>
        </div>
    </div>

    <div class="module-card form-card">

        <form method="get" class="mb-4">
            <label for="department_filter">
                <strong>Choisir un département pour filtrer les managers</strong>
            </label>

            <select name="department" id="department_filter" class="form-control mt-2">
                <option value="">---------</option>

                {% for dept in form.fields.department.queryset %}
                    <option value="{{ dept.id }}"
                        {% if selected_department|stringformat:"s" == dept.id|stringformat:"s" %}
                            selected
                        {% endif %}
                    >
                        {{ dept.name }}
                    </option>
                {% endfor %}
            </select>

            <button type="submit" class="btn-green mt-3">
                Filtrer les managers
            </button>
        </form>

        <hr class="my-4">

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form.as_p }}

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn-green">
                    Enregistrer
                </button>

                <a href="{% url 'employee_list' %}" class="btn-outline-soft">
                    Annuler
                </a>
            </div>
        </form>

    </div>

</div>
{% endblock %}
