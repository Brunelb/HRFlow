{% extends 'base.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}
    <h2>Connexion</h2>

    {% if form.errors %}
        <p>Nom d'utilisateur ou mot de passe incorrect.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Se connecter</button>
    </form>
{% endblock %}
