{% extends 'base.html' %}

{% block title %}Supprimer document{% endblock %}

{% block content %}
    <h1>Supprimer le document</h1>

    <p>Es-tu sûr de vouloir supprimer le document <strong>{{ document.title }}</strong> ?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Oui, supprimer</button>
    </form>

    <p><a href="{% url 'document_list' %}">Annuler</a></p>
{% endblock %}
